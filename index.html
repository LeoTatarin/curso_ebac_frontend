<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <header>
        <h1>Cadastro</h1>
        <hr />
    </header>
    <main>
        <form>
            <label for="Nome">Nome:</label>
            <br />
            <input id="Nome" type="text" placeholder="Digite aqui seu nome"> 
            <br />  
            <label for="Email">Email:</label>
            <br />
            <input id="Email" type="email" placeholder="Difite aqui seu email">
            <br />
            <label for="Senha">Senha:</label>
            <br />
            <input id="Senha" type="password" placeholder="Crie aqui uma senha">
            <br />
            <br />
            <button type="summit">
                enviar
            </button>
            <button type="reset">
                Limpar
            </button>
        </form>
        <hr />
    </main>
</body>
</html>
